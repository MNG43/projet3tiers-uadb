---
- name: Provisionner VM3 - Serveur Base de Données
  hosts: localhost
  become: yes
  vars:
    db_root_password: "RootPass2024!"
    db_user: webapp
    db_password: WebApp2024!Secure
    db_name: projet3tiers

  tasks:
    - name: Mettre à jour le système
      apt:
        update_cache: yes
        upgrade: dist

    - name: Installer MySQL et dépendances Python
      apt:
        name: 
          - mysql-server
          - python3-mysqldb  # Nécessaire pour les modules Ansible mysql_*
        state: present

    - name: Démarrer et activer MySQL
      systemd:
        name: mysql
        state: started
        enabled: yes

    - name: Sécuriser MySQL (Root password)
      shell: |
        mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ db_root_password }}';"
        mysql -u root -p'{{ db_root_password }}' -e "DELETE FROM mysql.user WHERE User='';"
        mysql -u root -p'{{ db_root_password }}' -e "FLUSH PRIVILEGES;"
      ignore_errors: yes

    - name: Créer la base de données
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_password: "{{ db_root_password }}"
        login_user: root

    - name: Créer l'utilisateur webapp (Autoriser le réseau LAN)
      mysql_user:
        name: "{{ db_user }}"
        host: "192.168.10.%"  # Autorise tout le sous-réseau LAN (où se trouve la VM2)
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_password: "{{ db_root_password }}"
        login_user: root

    - name: Créer la table utilisateurs
      shell: |
        mysql -u root -p'{{ db_root_password }}' -e "
        CREATE TABLE IF NOT EXISTS {{ db_name }}.utilisateurs (
            id INT AUTO_INCREMENT PRIMARY KEY,
            nom VARCHAR(100) NOT NULL,
            email VARCHAR(150) UNIQUE NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );"

    - name: Insérer données de test (Moussa, Fatou, Ibou)
      shell: |
        mysql -u root -p'{{ db_root_password }}' -e "
        INSERT INTO {{ db_name }}.utilisateurs (nom, email) VALUES
        ('Moussa DIALLO', 'moussa@uadb.sn'),
        ('Fatou NDIAYE', 'fatou@uadb.sn'),
        ('Ibou FALL', 'ibou@uadb.sn')
        ON DUPLICATE KEY UPDATE nom=VALUES(nom);"

    - name: Configurer l'écoute sur l'IP LAN
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 192.168.10.10'

    - name: Redémarrer MySQL pour appliquer les changements
      systemd:
        name: mysql
        state: restarted

    - name: Configurer UFW (Autoriser MySQL port 3306)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 22
        - 3306

    - name: Activer UFW
      ufw:
        state: enabled
        policy: deny
        direction: incoming
