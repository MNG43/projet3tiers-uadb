---
- name: Provisionner VM2 - Serveur Web (Node.js + Nginx)
  hosts: web
  become: yes
  vars_files:
    - group_vars/all.yml

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes

    - name: Installer les dépendances
      apt:
        name:
          - git
          - curl
          - nginx
          - mysql-client
          - ufw
        state: present

    - name: Installer Node.js {{ node_version }}.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
        apt install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Créer le répertoire de l'application
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: 0755

    - name: Cloner le dépôt GitHub
      git:
        repo: https://github.com/MNG43/projet-3tiers.git
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: www-data

    - name: Installer les dépendances npm
      npm:
        path: "{{ app_dir }}"
        production: yes
        state: present
      become_user: www-data

    - name: Créer le fichier .env
      copy:
        content: |
          DB_HOST={{ db_host }}
          DB_USER={{ db_user }}
          DB_PASS={{ db_password }}
          DB_NAME={{ db_name }}
          PORT=3000
        dest: "{{ app_dir }}/.env"
        owner: www-data
        group: www-data
        mode: 0640

    - name: Configurer le service systemd
      copy:
        dest: /etc/systemd/system/nodeapp.service
        content: |
          [Unit]
          Description=Projet 3-Tiers Node.js App
          After=network.target

          [Service]
          Type=simple
          User=www-data
          Group=www-data
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/node {{ app_dir }}/index.js
          Restart=always
          RestartSec=5
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target

    - name: Démarrer et activer nodeapp
      systemd:
        name: nodeapp
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Configurer Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/projet3tiers
        content: |
          server {
              listen 80;
              server_name _;
              access_log /var/log/nginx/projet3tiers.log;
              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
              server_tokens off;
          }

    - name: Activer le site
      file:
        src: /etc/nginx/sites-available/projet3tiers
        dest: /etc/nginx/sites-enabled/projet3tiers
        state: link

    - name: Désactiver le site par défaut
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Redémarrer Nginx
      service:
        name: nginx
        state: restarted

    - name: Ouvrir le port 80 dans le firewall
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Activer UFW
      ufw:
        state: enabled
        policy: deny
        direction: incoming
